# 打 tag 推送（如 v0.2.1）后自动构建 Windows NSIS + macOS DMG/ZIP，并创建 GitHub Release。
# 手动运行 workflow（workflow_dispatch）仅上传 Actions 构件，不创建 Release。
name: Release desktop (Windows & macOS)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build NSIS (unsigned)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist

      - uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: release/*
          if-no-files-found: error

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build DMG & ZIP (unsigned)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist

      - uses: actions/upload-artifact@v4
        with:
          name: installer-mac
          path: release/*
          if-no-files-found: error

  publish-release:
    needs: [build-windows, build-mac]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: installer-windows
          path: windows

      - uses: actions/download-artifact@v4
        with:
          name: installer-mac
          path: mac

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows/**/*
            mac/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
