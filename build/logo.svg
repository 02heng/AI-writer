<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="Orb" cx="36%" cy="30%" r="88%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </radialGradient>
  </defs>
  <!-- 外轮廓：方形圆角图标（应用 / 安装包惯例） -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#Orb)"/>
  <!-- 纸 + 一笔 -->
  <rect x="124" y="332" width="264" height="48" rx="12" fill="#f8fafc"/>
  <rect x="152" y="350" width="96" height="12" rx="6" fill="#2dd4bf"/>
  <!-- 简约机器人：单胶囊身 + 面罩条 -->
  <rect x="188" y="136" width="116" height="184" rx="58" fill="#f1f5f9"/>
  <rect x="210" y="186" width="72" height="14" rx="7" fill="#334155"/>
  <!-- 笔：黄身 + 深色笔尖，斜向落在纸上 -->
  <g transform="rotate(-35 308 308)">
    <rect x="278" y="258" width="96" height="20" rx="10" fill="#fbbf24"/>
    <rect x="368" y="263" width="36" height="10" rx="3" fill="#fef9c3"/>
